# 生产部署覆盖（inkwild.app + admin.inkwild.app）。
# 用法：
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# 关键点：
# - 端口只绑 127.0.0.1，由前置 nginx 做 HTTPS 入口
# - NEXT_PUBLIC_* 通过 build args 烤进客户端 bundle（Dockerfile 已声明 ARG）
# - 替代了原服务器上手写的 docker-compose.override.yml，请删掉那份

services:
  db:
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/inkwild
      REDIS_URL: redis://redis:6379/0
      DEBUG: "false"
      SESSION_COOKIE_DOMAIN: .inkwild.app
      CORS_EXTRA_ORIGINS: https://inkwild.app,https://admin.inkwild.app

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://inkwild.app
    # 宿主 3000 常被本机开发服务占用，生产入口层默认指向 3100。
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://inkwild.app
      INTERNAL_API_URL: http://backend:8000

  admin-frontend:
    build:
      context: ./admin-frontend
      args:
        NEXT_PUBLIC_API_URL: https://admin.inkwild.app
        NEXT_PUBLIC_MAIN_SITE_URL: https://inkwild.app
        NEXT_PUBLIC_USE_MOCK_EXPERIMENT_DATA: "false"
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: https://admin.inkwild.app
      NEXT_PUBLIC_MAIN_SITE_URL: https://inkwild.app
      NEXT_PUBLIC_USE_MOCK_EXPERIMENT_DATA: "false"
      INTERNAL_API_URL: http://backend:8000
